mode: "patch_capsule"                # One of: "vit_mlp" | "vit_capsule" | "multiscale_capsule" | "patch_capsule"
                          # vit_mlp            -> Stage 1: ViT + MLP classifier (baseline)
                          # vit_capsule        -> Stage 2: ViT + Capsule Network head
                          # multiscale_capsule -> Stage 3: dual-scale ViT + CLS concat + Capsule head
                          # patch_capsule      -> Stage 4: patch tokens as spatial primary capsules

model:
  image_size: 256         # Input image size (height and width). Must be divisible by patch_size.
  patch_size: 16          # Primary patch size. 256/16 = 16x16 = 256 patches.
  patch_size_fine: 8      # Fine-grained patch size for Stage 3 only. 256/8 = 32x32 = 1024 patches.
  depth_fine: 2           # Very shallow — 1024 tokens is extremely expensive; 2 layers sufficient for local feature extraction.
  gradient_checkpoint_fine: true  # Recompute fine encoder activations during backward to save VRAM (1024 tokens would OOM on 6GB otherwise).
  dim: 512                # Embedding dimension throughout the ViT. Scaled up from weather project (384).
  depth: 10               # Number of Transformer encoder layers. Scaled up from 8.
  heads: 8                # Number of attention heads. Must divide evenly into dim (512/8=64).
  mlp_dim: 1024           # Hidden dimension of Transformer feedforward layers (2x dim).
  dropout: 0.1            # Dropout rate throughout the ViT encoder.
  num_classes: 45         # RESISC45 has 45 scene classes.

capsule:
  primary_caps_channels: 128   # Must exceed num_classes (45) to avoid rank deficiency in routing.
  primary_caps_dim: 8          # Dimensionality of each primary capsule vector.
  digit_caps_dim: 8            # Reduced from 16 — halves W matrix params (23k samples vs 60k MNIST).
  num_routing: 3               # Number of dynamic routing iterations (Sabour et al. recommend 3).
  caps_dropout: 0.2            # Dropout on primary capsules before routing to prevent co-adaptation.

loss:
  margin_loss_lambda: 0.5      # Weight on the absent class margin loss term.
  m_plus: 0.9                  # Upper margin: present class capsule length should exceed this.
  m_minus: 0.1                 # Lower margin: absent class capsule length should be below this.

training:
  epochs: 100
  patience: 15                 # Early stopping patience.
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.1
  betas: [0.9, 0.999]
  eta_min: 0.000001            # Minimum LR for cosine annealing scheduler.
  grad_clip: 1.0
  accumulation_steps: 4        # Effective batch size = 32 * 4 = 128.
  capsule_warmup_epochs: 10    # Freeze ViT encoder for first N epochs (capsule modes only).

data:
  dataset_name: "jonathan-roberts1/NWPU-RESISC45"   # HuggingFace dataset identifier.
  data_dir: "data/resisc45"                          # Local cache directory.
  train_split: 0.75            # 525 images per class for training.
  val_split: 0.107             # 75 images per class for validation.
  test_split: 0.143            # 100 images per class for test.
  num_workers: 4
  image_mean: [0.3682, 0.3810, 0.3436]   # RESISC45 dataset mean (RGB).
  image_std: [0.2025, 0.1852, 0.1844]    # RESISC45 dataset std (RGB).

